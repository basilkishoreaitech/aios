name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: aios/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        env:
          # Tests run against the local SQLite path; no Azure credentials required.
          DATABASE_URL: sqlite+aiosqlite:///./aios_ci.db
        run: python -m pytest -q
